security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                default_target_path: app_login
            logout:
                path: app_logout
                target: app_login

    access_control:
        # Admin - Accès restreint
        - { path: ^/admin, roles: ROLE_ADMIN }
        
        # Front - Pages publiques (tout le monde)
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/filiere, roles: PUBLIC_ACCESS }
        - { path: ^/etablissement, roles: PUBLIC_ACCESS }
        - { path: ^/evenement, roles: PUBLIC_ACCESS }
        
        # Front - Pages protégées (utilisateurs connectés uniquement)
        - { path: ^/profil, roles: ROLE_USER }
        - { path: ^/forum/sujet/nouveau, roles: ROLE_USER }
        - { path: ^/forum/sujet/[0-9]+/repondre, roles: ROLE_USER }
        - { path: ^/quiz, roles: ROLE_ELEVE }
        - { path: ^/quiz/start, roles: ROLE_ELEVE }
        - { path: ^/quiz/submit, roles: ROLE_ELEVE }
        - { path: ^/mentorat/demander, roles: ROLE_ELEVE }
        - { path: ^/mentorat/mes-demandes, roles: ROLE_ELEVE }
        - { path: ^/mentorat/requetes, roles: ROLE_MENTOR }
        - { path: ^/mentorat/repondre, roles: ROLE_MENTOR }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10